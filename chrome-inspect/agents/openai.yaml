interface:
  display_name: "Chrome Inspect"
  short_description: "Capture a selected element context, summarize it, and return ready-to-apply mutation context."
  default_prompt: |
    When `/chrome-inspect` is triggered:
    1. Resolve startup URL in this order:
       - explicit user URL (if provided)
       - detected docs webapp entry URL from `CHROME_INSPECT_PROJECT_ROOT`
       - `CHROME_USE_DEFAULT_WEBAPP_URL`
       - `about:blank`
    2. Open Chrome in the resolved URL with:
       `bash scripts/open_url.sh "<resolved_url>"`
       so the dedicated profile/debug endpoint is ready, the dedicated profile remains a single-window instance, and local docs webapp is auto-started when
       `CHROME_INSPECT_PROJECT_ROOT` points to a local project (for example
       `/Users/longbiao/Projects/home-page`).
    3. Ensure the MCP session is running in inspect mode (`CHROME_USE_MCP_MODE=inspect`).
       You can use `scripts/../chrome-use/scripts/chrome_devtools_mcp_wrapper_inspect.sh` by default.
    4. Create a durable capture workflow with `inspect(action="begin_capture")` and store the returned `workflowId`.
       If the current client cannot drive the inspect MCP handshake reliably, create the workflow first,
       then restart or attach the inspect bridge so it rehydrates `activeWorkflowId` from durable state and arms inspect mode.
    5. Wait for the operator to select an element in Chrome only after inspect mode is armed, then call
       `inspect(action="await_selection", workflowId="<workflowId>")`.
       Do not return a final response, partial completion summary, or timeout-style "Worked for ..."
       message before the tool returns an element selection result.
    6. If the return is `phase=awaiting_user_instruction`, output the selected-element
       `summary` and ask exactly one operator question: `How should I edit it?`.
    7. After the user provides instruction text, call
       `inspect(action="apply_instruction", workflowId="<workflowId>", instruction="<user instruction>")`.
    8. Return the `ready_to_apply` payload and keep `selectedElement`, `position`, and `page` as mutation context.
       If the inspect bridge is attached but durable state still shows `activeWorkflowId: null`,
       recover by creating a fresh workflow and restarting the inspect bridge.
  allow_implicit_invocation: false

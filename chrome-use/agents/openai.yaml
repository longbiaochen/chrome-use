interface:
  display_name: "Chrome Use (base)"
  short_description: "Shared tooling and scripts for dedicated Chrome DevTools MCP sessions."
  default_prompt: |
    `chrome-use` is a shared helper package for explicit skills:
    - `chrome-inspect`
    - `chrome-auth`
    This package keeps startup and profile helpers but does not define a slash command by itself.
policy:
  allow_implicit_invocation: false

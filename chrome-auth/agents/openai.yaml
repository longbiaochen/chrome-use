interface:
  display_name: "Chrome Auth"
  short_description: "Run authentication workflows in dedicated Chrome profile mode with state preserved."
  default_prompt: |
    When `/chrome-auth` is triggered:
    1. Resolve startup URL and open it with `bash scripts/open_url.sh "<target URL>"`.
       `scripts/open_url.sh` resolves the startup URL in this order:
       - explicit auth/login/authorization URL
       - `CHROME_USE_DEFAULT_WEBAPP_URL`
       - `about:blank`
    2. Run MCP in standard mode (`scripts/../chrome-use/scripts/chrome_devtools_mcp_wrapper.sh`) so the dedicated session remains the same.
    3. Guide the user through operator-driven auth actions (navigate, type, click, screenshot, and state checks).
    4. Do not auto-fill credentials directly.
    5. Preserve the same Chrome process and profile state for follow-up auth calls.
  allow_implicit_invocation: false
